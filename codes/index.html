<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
</head>
<body>
    <section class="calc-body">
        <div class="input-container">
            <div class="user-input">
                <input type="number" name="number" id="userInput" placeholder="0">
            </div>

            <div class="calc-buttons">
                <div class="row first">
                    <button>7</button>
                    <button>8</button>
                    <button>9</button>
                    <button>&divide;</button>
                </div>
                
                <div class="row second">
                    <button>4</button>
                    <button>5</button>
                    <button>6</button>
                    <button>&times;</button>
                </div>
                
                <div class="row third">
                    <button>1</button>
                    <button>2</button>
                    <button>3</button>
                    <button>&minus;</button>
                </div>

                <div class="row fourth">
                    <button>0</button>
                    <button>&dot;</button>
                    <button>&plus;</button>
                    <button>&equals;</button>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
