<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calc-body">

        <div class="input-container">
            <div class="input">
                <input type="text" name="user-input" id="user-input" value="0" readonly>
            </div>
        </div>

        <div class="calc-button">
            <div class="button-container">
                <button><p>7</p></button>
            </div>

            <div class="button-container">
                <button>8</button>
            </div>

            <div class="button-container">
                <button>9</button>
            </div>

            <div class="button-container">
                <button>&divide;</button>
            </div>

            <div class="button-container">
                <button>4</button>
            </div>

            <div class="button-container">
                <button>5</button>
            </div>

            <div class="button-container">
                <button>6</button>
            </div>

            <div class="button-container">
                <button>&times;</button>
            </div>

            <div class="button-container">
                <button>1</button>
            </div>

            <div class="button-container">
                <button>2</button>
            </div>

            <div class="button-container">
                <button>3</button>
            </div>

            <div class="button-container">
                <button>&minus;</button>
            </div>

            <div class="button-container zero">
                <button>0</button>
            </div>

            <div class="button-container dot">
                <button>.</button>
            </div>

            <div class="button-container">
                <button>&plus;</button>
            </div>

            <div class="button-container">
                <button>&equals;</button>
            </div>
        </div>

    </div>
</body>
</html>
