<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calc-body">

        <div class="input-container">
            <div class="input">
                <input type="text" name="userInput" id="userInput" placeholder="0" readonly>
            </div>
        </div>

        <div class="clearBtn">
            <button class="clear" style="grid-area: clear-button" onclick="clearDisplay()">AC</button>
            
            <button class="clearValue"  onclick="clearDisplay()">C</button>
        </div>

        <div class="calc-button">

            <button class="numberBtn">7</button>
            <button class="numberBtn">8</button>
            <button class="numberBtn">9</button>
            <button class="operator">&divide;</button>
            <button class="numberBtn">4</button>
            <button class="numberBtn">5</button>
            <button class="numberBtn">6</button>
            <button class="operator">&times;</button>
            <button class="numberBtn">1</button>
            <button class="numberBtn">2</button>
            <button class="numberBtn">3</button>
            <button class="operator">&minus;</button>
            <button class="numberBtn zero">0</button>
            <button class="numberBtn dot">.</button>
            <button class="operator">&plus;</button>
            <button class="result equalBtn">&equals;</button>

        </div>

            
    </div>

    <script src="main.js"></script>
</body>
</html>
