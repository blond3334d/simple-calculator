<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calc-body">

        <div class="input-container">
            <div class="input">
                <input type="text" name="userInput" id="userInput" placeholder="0" readonly>
            </div>
        </div>

        <div class="clearBtn">
            <button class="clear" style="grid-area: clear-button" onclick="clearDisplay()">AC</button>
            
            <button class="clearValue"  onclick="clearDisplay()">C</button>
        </div>

        <div class="calc-button">

            <button class="numberBtn" onclick="appendToDisplay('7')">7</button>
            <button class="numberBtn" onclick="appendToDisplay('8')">8</button>
            <button class="numberBtn" onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('&divide;')">&divide;</button>
            <button class="numberBtn" onclick="appendToDisplay('4')">4</button>
            <button class="numberBtn" onclick="appendToDisplay('5')">5</button>
            <button class="numberBtn" onclick="appendToDisplay('6')">6</button>
            <button class="operator" onclick="appendToDisplay('&times;')">&times;</button>
            <button class="numberBtn" onclick="appendToDisplay('1')">1</button>
            <button class="numberBtn" onclick="appendToDisplay('2')">2</button>
            <button class="numberBtn" onclick="appendToDisplay('3')">3</button>
            <button class="operator" onclick="appendToDisplay('&minus;')">&minus;</button>
            <button class="zero" onclick="appendToDisplay('0')">0</button>
            <button class="numberBtn dot" onclick="appendToDisplay('.')">.</button>
            <button class="operator" onclick="appendToDisplay('&plus;')">&plus;</button>
            <button class="result" onclick="calculateResult()">&equals;</button>

        </div>

            
    </div>

    <script src="main.js"></script>
</body>
</html>
